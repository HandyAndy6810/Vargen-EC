<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VGN-EC — Home (Mission Control)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; font-family: 'Manrope', -apple-system, system-ui, sans-serif; background: #1a1815; min-height: 100vh; }
  #stage {
    min-height: 100vh; width: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(242,106,42,0.12), transparent 70%),
      radial-gradient(ellipse 60% 50% at 50% 100%, rgba(242,106,42,0.08), transparent 70%),
      #17150f;
    box-sizing: border-box;
  }
  .device-wrap {
    filter: drop-shadow(0 40px 80px rgba(0,0,0,0.5));
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="lib/ios-frame.jsx"></script>
<script type="text/babel" src="lib/mission-control.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
function App() {
  return (
    <div id="stage">
      <div className="device-wrap">
        <IOSDevice width={402} height={874} dark={false}>
          <MissionControl />
        </IOSDevice>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
