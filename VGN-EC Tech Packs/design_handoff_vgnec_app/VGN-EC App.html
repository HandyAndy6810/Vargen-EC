<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VGN-EC — Full App Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; font-family: 'Manrope', -apple-system, system-ui, sans-serif; background: #17150f; min-height: 100vh; color: #f5f3ef; }
  * { box-sizing: border-box; }
  button { font-family: inherit; border: none; background: none; cursor: pointer; padding: 0; color: inherit; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  #root { min-height: 100vh; }

  /* stage */
  .stage {
    min-height: 100vh; width: 100%;
    display: flex; gap: 32px; padding: 32px;
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(242,106,42,0.10), transparent 70%),
      #17150f;
  }
  .stage.dark { background: #0a0906; }
  .left-rail {
    width: 260px; flex-shrink: 0; position: sticky; top: 32px; height: fit-content;
    color: #f5f3ef;
  }
  .right-stage {
    flex: 1; display: flex; justify-content: center; align-items: flex-start;
    min-width: 0;
  }
  .device-wrap { filter: drop-shadow(0 40px 80px rgba(0,0,0,0.5)); }

  /* nav rail */
  .rail-title {
    font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(245,243,239,0.4); margin-bottom: 12px;
  }
  .rail-group { margin-bottom: 22px; }
  .rail-item {
    display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    padding: 8px 12px; border-radius: 10px; color: rgba(245,243,239,0.65);
    font-size: 13px; font-weight: 600; margin-bottom: 2px;
    transition: all 0.15s;
  }
  .rail-item:hover { background: rgba(255,255,255,0.04); color: #f5f3ef; }
  .rail-item.active { background: rgba(242,106,42,0.15); color: #f26a2a; font-weight: 800; }
  .rail-item .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; flex-shrink: 0; }
  .rail-item.active .dot { opacity: 1; }

  .brand {
    display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
  }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 8px; background: #f26a2a;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #fff; font-size: 14px;
  }
  .brand-name { font-size: 14px; font-weight: 800; letter-spacing: -0.2px; }
  .brand-sub { font-size: 10px; color: rgba(245,243,239,0.4); font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-radius: 10px; background: rgba(255,255,255,0.04);
    margin-bottom: 8px; font-size: 12px; font-weight: 600;
    color: rgba(245,243,239,0.8);
  }
  .toggle {
    width: 34px; height: 20px; border-radius: 999px; background: rgba(255,255,255,0.15);
    position: relative; cursor: pointer; transition: background 0.2s;
  }
  .toggle.on { background: #f26a2a; }
  .toggle-knob {
    position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
    background: #fff; border-radius: 50%; transition: left 0.2s;
  }
  .toggle.on .toggle-knob { left: 16px; }

  /* fallbacks while JS loads */
  .loading {
    color: rgba(245,243,239,0.5); font-size: 13px; text-align: center;
    padding: 120px 0;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/ios-frame.jsx"></script>
<script type="text/babel" src="lib/app-shell.jsx"></script>
<script type="text/babel" src="lib/mission-control.jsx"></script>
<script type="text/babel" src="lib/screen-ai-chat.jsx"></script>
<script type="text/babel" src="lib/screen-quotes.jsx"></script>
<script type="text/babel" src="lib/screen-jobs.jsx"></script>
<script type="text/babel" src="lib/screen-invoices.jsx"></script>
<script type="text/babel" src="lib/screen-calendar.jsx"></script>
<script type="text/babel" src="lib/screen-profile.jsx"></script>
</head>
<body>
<div id="root"><div class="loading">Loading prototype…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const SCREENS = [
  { group: 'Primary', items: [
    { id: 'home',        label: 'Home · Mission Control', render: () => <MissionControl /> },
    { id: 'ai-entry',    label: 'AI Chat · Prompt',        render: () => <AiChatPrompt /> },
    { id: 'ai-clarify',  label: 'AI Chat · Clarifying',    render: () => <AiChatClarify /> },
    { id: 'ai-draft',    label: 'AI Chat · Draft quote',   render: () => <AiChatDraft /> },
    { id: 'ai-confirm',  label: 'AI Chat · Confirm & send',render: () => <AiChatConfirm /> },
  ]},
  { group: 'Quotes', items: [
    { id: 'quotes-list',  label: 'Quotes · List',    render: () => <QuotesList /> },
    { id: 'quotes-detail',label: 'Quotes · Detail',  render: () => <QuoteDetail /> },
    { id: 'quotes-create',label: 'Quotes · Create',  render: () => <QuoteCreate /> },
  ]},
  { group: 'Jobs', items: [
    { id: 'jobs-list',    label: 'Jobs · List',      render: () => <JobsList /> },
    { id: 'jobs-detail',  label: 'Jobs · Detail',    render: () => <JobDetail /> },
    { id: 'jobs-timer',   label: 'Jobs · Active timer', render: () => <JobTimer /> },
    { id: 'jobs-complete',label: 'Jobs · Completion',render: () => <JobCompletion /> },
  ]},
  { group: 'Invoices', items: [
    { id: 'invoices-list',  label: 'Invoices · List',  render: () => <InvoicesList /> },
    { id: 'invoices-detail',label: 'Invoices · Detail',render: () => <InvoiceDetail /> },
    { id: 'invoices-create',label: 'Invoices · Create',render: () => <InvoiceCreate /> },
  ]},
  { group: 'Other', items: [
    { id: 'calendar', label: 'Calendar · Week',     render: () => <CalendarScreen /> },
    { id: 'profile',  label: 'Profile · Settings',  render: () => <ProfileScreen /> },
  ]},
];

function App() {
  const [active, setActive] = useState(() => localStorage.getItem('vgn_proto_active') || 'home');
  const [dark, setDark] = useState(() => localStorage.getItem('vgn_proto_dark') === '1');

  useEffect(() => { localStorage.setItem('vgn_proto_active', active); }, [active]);
  useEffect(() => { localStorage.setItem('vgn_proto_dark', dark ? '1' : '0'); }, [dark]);

  const current = SCREENS.flatMap(g => g.items).find(s => s.id === active) || SCREENS[0].items[0];

  // global nav context so screens can cross-link
  window.__vgnNav = setActive;

  return (
    <div className={"stage" + (dark ? " dark" : "")}>
      <aside className="left-rail">
        <div className="brand">
          <div className="brand-mark">V</div>
          <div>
            <div className="brand-name">Vargenezey</div>
            <div className="brand-sub">Prototype v0.2</div>
          </div>
        </div>

        <div className="toggle-row">
          <span>Dark mode</span>
          <div className={"toggle" + (dark ? " on" : "")} onClick={() => setDark(d => !d)}>
            <div className="toggle-knob" />
          </div>
        </div>

        {SCREENS.map(g => (
          <div className="rail-group" key={g.group}>
            <div className="rail-title">{g.group}</div>
            {g.items.map(s => (
              <button
                key={s.id}
                className={"rail-item" + (active === s.id ? " active" : "")}
                onClick={() => setActive(s.id)}
              >
                <span className="dot" />
                <span>{s.label}</span>
              </button>
            ))}
          </div>
        ))}

        <div style={{
          marginTop: 24, padding: 12, borderRadius: 10,
          background: 'rgba(242,106,42,0.08)', border: '1px solid rgba(242,106,42,0.2)',
          fontSize: 11, color: 'rgba(245,243,239,0.7)', lineHeight: 1.5,
        }}>
          <b style={{ color: '#f26a2a' }}>Tip:</b> Tap buttons inside the phone — many cross-link to other screens.
        </div>
      </aside>

      <main className="right-stage">
        <div className="device-wrap">
          <IOSDevice width={402} height={874} dark={dark}>
            {current.render()}
          </IOSDevice>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
